<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的全球持仓监控 - PORTFOLIO</title>
    <style>
        :root { 
            --bg-color: #0b111e; 
            --card-bg: #161e2e; 
            --text-color: #f5f6fa; 
            --accent: #00f2fe; 
            --up: #ff4d4f; 
            --down: #2ecc71; 
            --border: #242f47; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); padding: 24px 16px; padding-bottom: 80px; }
        
        .container { max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
        .title-main { font-size: 32px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
        .mv-label { font-size: 13px; color: #6c7a9c; text-align: right; }
        .mv-value { font-size: 30px; font-weight: bold; }
        
        .stats-grid { display: flex; background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 24px; gap: 15px; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 120px; text-align: center; }
        .stat-label { font-size: 12px; color: #6c7a9c; margin-bottom: 6px; }
        .stat-val { font-size: 20px; font-weight: bold; }
        
        /* 一级导航栏 */
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .tab-item { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #6c7a9c; font-size: 15px; }
        .tab-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }
        
        /* 二级市场切换标签栏 */
        .market-filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn { background: #1c273d; color: #a5b7da; border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .sync-banner { background: rgba(0, 242, 254, 0.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .sync-text { font-size: 12px; color: #8fa0c4; line-height: 1.5; }
        .btn-sm { background: #212e4a; color: #a5b7da; border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-left: 5px; }
        .btn-add { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; cursor: pointer; font-size: 16px; }
        
        .cards-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        
        .stock-card { background: var(--card-bg); border-radius: 12px; padding: 18px; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: space-between; }
        .stock-card.alert { border-color: var(--up); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 0px rgba(255,77,79,0); } 50% { box-shadow: 0 0 15px rgba(255,77,79,0.25); } }
        
        .card-top { display: flex; justify-content: space-between; margin-bottom: 14px; }
        .market-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; font-weight: bold; }
        .badge-a { background: rgba(255,77,79,0.15); color: var(--up); }
        .badge-hk { background: rgba(0,242,254,0.15); color: var(--accent); }
        .badge-us { background: rgba(46,204,113,0.15); color: var(--down); }

        .code { color: var(--accent); font-weight: bold; margin-right: 4px; font-family: monospace; font-size: 15px; }
        .name { font-weight: bold; font-size: 16px; }
        .change { font-weight: bold; font-size: 15px; }
        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; }
        .data-cell { text-align: center; }
        .lbl { font-size: 11px; color: #536380; margin-bottom: 4px; }
        .val { font-size: 14px; font-weight: 500; }
        .card-ft { margin-top: 14px; padding-top: 10px; border-top: 1px solid #1c273d; display: flex; justify-content: space-between; font-size: 12px; color: #6c7a9c; }
        
        .up { color: var(--up); } .down { color: var(--down); }
        
        .table-responsive { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 12px; padding: 8px; margin-bottom: 20px; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 450px; }
        .report-table th { text-align: left; color: #6c7a9c; padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .report-table td { padding: 14px 12px; border-bottom: 1px solid var(--border); }
        
        /* 市场资产分布统计栏 */
        .market-dist-summary { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .dist-box { flex: 1; min-width: 150px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
        .dist-title { font-size: 12px; color: #6c7a9c; margin-bottom: 4px; }
        .dist-num { font-size: 16px; font-weight: bold; color: #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); border-radius: 15px; padding: 24px; width: 90%; max-width: 420px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; color: #8fa0c4; margin-bottom: 6px; }
        .form-group input { width: 100%; background: #0b111e; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .btn-confirm { background: var(--accent); color: #000; border: none; padding: 10px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-cancel { background: #212e4a; color: #a5b7da; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><div class="title-main">PORTFOLIO</div><div style="font-size:12px;color:#8da2fb;margin-top:2px;">全球全市场资产监控看板</div></div>
            <div class="mv-box"><div class="mv-label">资产总市值 (CNY)</div><div class="mv-value" id="total-mv">¥0.00</div></div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-item"><div class="stat-label">预计总盈亏</div><div class="stat-val" id="total-profit">¥0.00</div></div>
            <div class="stat-item"><div class="stat-label">总收益率</div><div class="stat-val" id="total-ratio">0.00%</div></div>
            <div class="stat-item"><div class="stat-label">总持仓标的</div><div class="stat-val" id="count">0</div></div>
        </div>
        
        <div class="tabs">
            <div class="tab-item active" onclick="switchTab(event, 'holding')">📊 持仓监控</div>
            <div class="tab-item" onclick="switchTab(event, 'report')">📑 财报数据</div>
            <div class="tab-item" onclick="switchTab(event, 'dist')">🧱 市场及资产分布</div>
        </div>
        
        <div class="sync-banner">
            <div class="sync-text">数据存于当前浏览器。换电脑请点击右侧【导出】复制文本，新电脑点击【导入】粘贴即可。</div>
            <div><button class="btn-sm" onclick="exportData()">导出</button><button class="btn-sm" onclick="importData()">导入</button></div>
        </div>
        
        <div id="holding" class="section active">
            <div class="market-filter-bar">
                <button class="filter-btn active" onclick="filterMarket(event, 'all')">全部市场</button>
                <button class="filter-btn" onclick="filterMarket(event, 'A')">🇨🇳 A股</button>
                <button class="filter-btn" onclick="filterMarket(event, 'HK')">🇭🇰 港股</button>
                <button class="filter-btn" onclick="filterMarket(event, 'US')">🇺🇸 美股</button>
            </div>
            <button class="btn-add" onclick="openModal()">+ 添加新持仓标的</button>
            <div id="list" class="cards-list"></div>
        </div>
        
        <div id="report" class="section">
            <div class="table-responsive">
                <table class="report-table">
                    <thead><tr><th>股票</th><th>市场</th><th>PE (市盈率)</th><th>ROE</th><th>营收增幅</th></tr></thead>
                    <tbody id="report-body"></tbody>
                </table>
            </div>
        </div>
        
        <div id="dist" class="section">
            <div class="market-dist-summary">
                <div class="dist-box"><div class="dist-title">🇨🇳 A股总资产</div><div class="dist-num" id="dist-a-val">¥0.00 (0%)</div></div>
                <div class="dist-box"><div class="dist-title">🇭🇰 港股总资产</div><div class="dist-num" id="dist-hk-val">¥0.00 (0%)</div></div>
                <div class="dist-box"><div class="dist-title">🇺🇸 美股总资产</div><div class="dist-num" id="dist-us-val">¥0.00 (0%)</div></div>
            </div>
            <div class="table-responsive">
                <table class="report-table">
                    <thead><tr><th>股票</th><th>所属市场</th><th>换算后市值(CNY)</th><th>全资产占比</th></tr></thead>
                    <tbody id="dist-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:18px; color:var(--accent)">编辑持仓</h3>
            <input type="hidden" id="edit-idx">
            <div class="form-group"><label>股票/ETF代码</label><input type="text" id="f-code" placeholder="如: 600519 或 AAPL"></div>
            <div class="form-group"><label>股票名称</label><input type="text" id="f-name" placeholder="如: 贵州茅台"></div>
            <div class="form-group"><label>持仓数量</label><input type="number" id="f-qty" placeholder="输入持股数量"></div>
            <div class="form-group"><label>买入成本价</label><input type="number" step="0.01" id="f-cost" placeholder="输入买入均价"></div>
            <div class="form-group"><label>高价预警 (选填)</label><input type="number" step="0.01" id="f-high" placeholder="高于此价闪烁报警"></div>
            <div class="form-group"><label>低价预警 (选填)</label><input type="number" step="0.01" id="f-low" placeholder="低于此价闪烁报警"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="save()">保存记录</button>
            </div>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('my_stocks') || '[]');
        let currentMarketFilter = 'all';

        // 核心：根据股票代码自动智能判断所属市场
        function judgeMarket(code) {
            let c = code.toUpperCase().trim();
            if (!c) return { id: 'A', name: 'A股', badge: 'badge-a' };
            // 如果全是数字且长度为5位，或者以000、001、01、02、09等开头的4-5位数字，判断为港股
            if (/^\d+$/.test(c)) {
                if (c.length === 5 || (c.length === 4 && (c.startsWith('0') || c.startsWith('1') || c.startsWith('2')))) {
                    return { id: 'HK', name: '港股', badge: 'badge-hk' };
                }
                return { id: 'A', name: 'A股', badge: 'badge-a' };
            }
            // 包含英文字母的，判定为美股市场
            return { id: 'US', name: '美股', badge: 'badge-us' };
        }

        function getMock(code) {
            let b = 100, pe = "15.2", roe = "12.4%", g = "+5.3%";
            let c = code.toUpperCase();
            if(c.startsWith('600519')){ b=1750; pe="28.4"; roe="29.1%"; g="+18.2%"; }
            else if(c.startsWith('000001')){ b=11.5; pe="4.5"; roe="10.2%"; g="+2.1%"; }
            else if(c==='META'){ b=485; pe="24.1"; roe="28.2%"; g="+25.4%"; }
            else if(c==='NVDA'){ b=125; pe="65.2"; roe="45.1%"; g="+115.2%"; }
            else if(c==='AAPL'){ b=182; pe="26.3"; roe="35.4%"; g="+8.7%"; }
            let p = b * (1 + (Math.random()-0.48)/100);
            return { p: p.toFixed(2), c: ((Math.random()-0.48)*2).toFixed(2), pe, roe, g };
        }

        function render() {
            let totalMv=0, totalCv=0;
            let marketMv = { A: 0, HK: 0, US: 0 }; // 各大市场汇总基础数据
            
            const list=document.getElementById('list'), rb=document.getElementById('report-body'), db=document.getElementById('dist-body');
            list.innerHTML=''; rb.innerHTML=''; db.innerHTML='';
            
            stocks.forEach((s, i) => {
                let m = getMock(s.code);
                let market = judgeMarket(s.code);
                
                // 简化模拟：由于数据存为人民币本币计价方便算比例，此处假设价格已进行过对应汇率折算
                let curMv = s.qty * m.p;
                let costMv = s.qty * s.cost;
                let pft = curMv - costMv;
                
                totalMv += curMv; 
                totalCv += costMv;
                marketMv[market.id] += curMv; // 累加到各自市场

                let isAlert = (s.high && m.p >= s.high) || (s.low && m.p <= s.low);
                
                // 二级过滤控制显示
                if (currentMarketFilter === 'all' || currentMarketFilter === market.id) {
                    list.innerHTML += `<div class="stock-card ${isAlert?'alert':''}">
                        <div class="card-top">
                            <div>
                                <span class="code">${s.code}</span>
                                <span class="name">${s.name}</span>
                                <span class="market-badge ${market.badge}">${market.name}</span>
                            </div>
                            <div class="change ${m.c>=0?'up':'down'}">${m.c>=0?'▲':'▼'}${Math.abs(m.c)}%</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-cell"><div class="lbl">持仓</div><div class="val">${s.qty}</div></div>
                            <div class="data-cell"><div class="lbl">现价</div><div class="val" style="color:var(--accent)">${m.p}</div></div>
                            <div class="data-cell"><div class="lbl">盈亏</div><div class="val ${pft>=0?'up':'down'}">${(pft/10000).toFixed(2)}万</div></div>
                            <div class="data-cell"><div class="lbl">当前市值</div><div class="val">${(curMv/10000).toFixed(2)}万</div></div>
                        </div>
                        <div class="card-ft">
                            <div>${isAlert?'⚠️ 触发价格预警':'状态: 行情联动中'}</div>
                            <div><span onclick="edit(${i})" style="cursor:pointer;color:var(--accent)">编辑</span> <span onclick="del(${i})" style="color:#ff4d4f;margin-left:12px;cursor:pointer;">删除</span></div>
                        </div>
                    </div>`;
                }
                
                rb.innerHTML += `<tr>
                    <td style="font-weight:bold;">${s.name}</td>
                    <td><span class="market-badge ${market.badge}">${market.name}</span></td>
                    <td>${m.pe}</td>
                    <td style="color:var(--down);font-weight:500;">${m.roe}</td>
                    <td class="up">${m.g}</td>
                </tr>`;
            });
            
            // 全局看板顶层统计
            document.getElementById('total-mv').innerText = '¥'+(totalMv/10000).toFixed(2)+'万';
            let tp = totalMv - totalCv;
            document.getElementById('total-profit').innerText = (tp>=0?'+':'')+(tp/10000).toFixed(2)+'万';
            document.getElementById('total-profit').className = 'stat-val '+(tp>=0?'up':'down');
            document.getElementById('total-ratio').innerText = (totalCv>0?(tp/totalCv*100).toFixed(2):'0.00')+'%';
            document.getElementById('count').innerText = stocks.length;
            
            // 分布页面渲染
            stocks.forEach(s => {
                let m = getMock(s.code);
                let market = judgeMarket(s.code);
                let curMv = s.qty * m.p;
                let ratio = totalMv > 0 ? (curMv / totalMv * 100).toFixed(1) : 0;
                
                db.innerHTML += `<tr>
                    <td style="font-weight:bold;">${s.name}</td>
                    <td><span class="market-badge ${market.badge}">${market.name}</span></td>
                    <td>¥${curMv.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                    <td style="color:var(--accent);font-weight:bold;">${ratio}%</td>
                </tr>`;
            });

            // 渲染顶部的三大市场各大占比数据
            let pctA = totalMv > 0 ? (marketMv.A / totalMv * 100).toFixed(1) : 0;
            let pctHK = totalMv > 0 ? (marketMv.HK / totalMv * 100).toFixed(1) : 0;
            let pctUS = totalMv > 0 ? (marketMv.US / totalMv * 100).toFixed(1) : 0;
            
            document.getElementById('dist-a-val').innerText = `¥${(marketMv.A/10000).toFixed(2)}万 (${pctA}%)`;
            document.getElementById('dist-hk-val').innerText = `¥${(marketMv.HK/10000).toFixed(2)}万 (${pctHK}%)`;
            document.getElementById('dist-us-val').innerText = `¥${(marketMv.US/10000).toFixed(2)}万 (${pctUS}%)`;
        }

        function filterMarket(e, marketId) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentMarketFilter = marketId;
            render();
        }

        function switchTab(e, id) {
            document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            e.target.classList.add('active'); document.getElementById(id).classList.add('active');
            render();
        }
        function openModal() { document.getElementById('edit-idx').value=''; document.getElementById('modal').style.display='flex'; }
        function closeModal() { document.getElementById('modal').style.display='none'; }
        function edit(i) {
            const s=stocks[i]; document.getElementById('edit-idx').value=i;
            document.getElementById('f-code').value=s.code; document.getElementById('f-name').value=s.name;
            document.getElementById('f-qty').value=s.qty; document.getElementById('f-cost').value=s.cost;
            document.getElementById('f-high').value=s.high||''; document.getElementById('f-low').value=s.low||'';
            document.getElementById('modal').style.display='flex';
        }
        function save() {
            let i=document.getElementById('edit-idx').value, data={
                code: document.getElementById('f-code').value.trim(), name: document.getElementById('f-name').value.trim(),
                qty: parseInt(document.getElementById('f-qty').value) || 0, cost: parseFloat(document.getElementById('f-cost').value) || 0,
                high: parseFloat(document.getElementById('f-high').value) || null, low: parseFloat(document.getElementById('f-low').value) || null
            };
            if(data.code && data.name) {
                if(i==='') stocks.push(data); else stocks[i]=data;
                localStorage.setItem('my_stocks', JSON.stringify(stocks)); closeModal(); render();
            } else { alert('请完整填写股票代码和名称'); }
        }
        function del(i) { if(confirm('确定删除该持仓吗?')){ stocks.splice(i,1); localStorage.setItem('my_stocks', JSON.stringify(stocks)); render(); } }
        function exportData() { navigator.clipboard.writeText(JSON.stringify(stocks)); alert('持仓数据已成功复制到剪贴板！'); }
        function importData() { let d=prompt('请粘贴导出的持仓 JSON 文本数据：'); if(d){ try { stocks=JSON.parse(d); localStorage.setItem('my_stocks', JSON.stringify(stocks)); render(); alert('导入成功！'); } catch(e) { alert('解析失败，数据格式不正确。'); } } }
        
        setInterval(render, 4000); 
        render();
    </script>
</body>
</html>
