<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球持仓综合监控系统 - PORTFOLIO</title>
    <style>
        :root { 
            --bg-color: #0b111e; 
            --card-bg: #161e2e; 
            --text-color: #f5f6fa; 
            --accent: #00f2fe; 
            --up: #ff4d4f; 
            --down: #2ecc71; 
            --border: #242f47; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); padding: 16px; padding-bottom: 80px; }
        
        .container { max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
        .title-main { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
        
        /* 核心升级：顶层核心指标分类大面板 */
        .stats-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stats-category-card { background: var(--card-bg); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
        .cat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c273d; padding-bottom: 6px; margin-bottom: 10px; }
        .cat-title { font-weight: bold; font-size: 14px; color: #8fa0c4; }
        .cat-count { font-size: 12px; background: #212e4a; padding: 2px 8px; border-radius: 10px; color: var(--accent); }
        .cat-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
        .cat-lbl { color: #536380; }
        .cat-val { font-weight: bold; font-size: 15px; }

        /* 导航及通知中心栏 */
        .tabs-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .tabs { display: flex; gap: 5px; }
        .tab-item { padding: 12px 16px; cursor: pointer; color: #6c7a9c; font-size: 14px; border-bottom: 2px solid transparent; }
        .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }
        
        .notice-setting-btn { background: rgba(0, 242, 254, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }

        .market-filter-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn { background: #1c273d; color: #a5b7da; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .sync-banner { background: rgba(0, 242, 254, 0.02); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 12px; }
        .btn-sm { background: #212e4a; color: #a5b7da; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn-add { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; font-size: 15px; }
        
        .cards-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
        
        .stock-card { background: var(--card-bg); border-radius: 12px; padding: 16px; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: space-between; }
        .stock-card.alert { border-color: var(--up); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 0px rgba(255,77,79,0); } 50% { box-shadow: 0 0 10px rgba(255,77,79,0.15); } }
        
        .card-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .market-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .badge-a { background: rgba(255,77,79,0.12); color: var(--up); }
        .badge-hk { background: rgba(0,242,254,0.12); color: var(--accent); }
        .badge-us { background: rgba(46,204,113,0.12); color: var(--down); }

        .code { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 14px; }
        .name-link { font-weight: bold; font-size: 15px; color: #fff; text-decoration: none; }
        .name-link:hover { color: var(--accent); text-decoration: underline; }
        .change { font-weight: bold; font-size: 14px; }
        
        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: rgba(0,0,0,0.15); padding: 10px; border-radius: 8px; }
        .data-cell { text-align: center; }
        .lbl { font-size: 10px; color: #536380; margin-bottom: 2px; }
        .val { font-size: 13px; font-weight: 500; }
        
        /* 外部连接区设计 */
        .links-row { display: flex; gap: 8px; margin-top: 10px; }
        .ext-link { flex: 1; text-align: center; background: #1c273d; color: #8fa0c4; font-size: 11px; padding: 5px; border-radius: 4px; text-decoration: none; border: 1px solid #24324f; }
        .ext-link:hover { background: #24324f; color: #fff; }
        .ext-link.sec { border-color: #e67e22; color: #e67e22; background: rgba(230,126,34,0.05); }
        .ext-link.sec:hover { background: #e67e22; color: #fff; }

        .card-ft { margin-top: 10px; padding-top: 8px; border-top: 1px solid #1c273d; display: flex; justify-content: space-between; font-size: 11px; color: #6c7a9c; }
        
        .up { color: var(--up); } .down { color: var(--down); }
        
        .table-responsive { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 12px; padding: 6px; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
        .report-table th { text-align: left; color: #6c7a9c; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
        .report-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); border-radius: 15px; padding: 20px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #8fa0c4; margin-bottom: 4px; }
        .form-group input { width: 100%; background: #0b111e; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; font-size: 13px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><div class="title-main">PORTFOLIO</div><div style="font-size:11px;color:#8da2fb;margin-top:2px;">全球多市场联动监控及财报通知中心</div></div>
        </div>
        
        <div class="stats-board">
            <div class="stats-category-card" style="border-color: var(--accent);">
                <div class="cat-header"><span class="cat-title" style="color:var(--accent);">🌍 跨境全资产</span><span class="cat-count" id="cnt-all">0</span></div>
                <div class="cat-row"><span class="cat-lbl">总市值 (CNY)</span><span class="cat-val" id="mv-all">¥0.00</span></div>
                <div class="cat-row"><span class="cat-lbl">总盈亏 / 收益率</span><span class="cat-val" id="pft-all">¥0.00 (0%)</span></div>
            </div>
            <div class="stats-category-card">
                <div class="cat-header"><span class="cat-title">🇨🇳 中国A股</span><span class="cat-count" id="cnt-A">0</span></div>
                <div class="cat-row"><span class="cat-lbl">市值</span><span class="cat-val" id="mv-A">¥0.00</span></div>
                <div class="cat-row"><span class="cat-lbl">盈亏 / 收益率</span><span class="cat-val" id="pft-A">¥0.00 (0%)</span></div>
            </div>
            <div class="stats-category-card">
                <div class="cat-header"><span class="cat-title">🇭🇰 中国港股</span><span class="cat-count" id="cnt-HK">0</span></div>
                <div class="cat-row"><span class="cat-lbl">市值</span><span class="cat-val" id="mv-HK">¥0.00</span></div>
                <div class="cat-row"><span class="cat-lbl">盈亏 / 收益率</span><span class="cat-val" id="pft-HK">¥0.00 (0%)</span></div>
            </div>
            <div class="stats-category-card" style="border-color: rgba(46,204,113,0.4);">
                <div class="cat-header"><span class="cat-title" style="color:var(--down);">🇺🇸 美国美股</span><span class="cat-count" id="cnt-US">0</span></div>
                <div class="cat-row"><span class="cat-lbl">市值</span><span class="cat-val" id="mv-US">¥0.00</span></div>
                <div class="cat-row"><span class="cat-lbl">盈亏 / 收益率</span><span class="cat-val" id="pft-US">¥0.00 (0%)</span></div>
            </div>
        </div>
        
        <div class="tabs-bar">
            <div class="tabs">
                <div class="tab-item active" onclick="switchTab(event, 'holding')">📊 持仓</div>
                <div class="tab-item" onclick="switchTab(event, 'report')">📑 财报披露</div>
            </div>
            <button class="notice-setting-btn" onclick="requestNoticePermission()">🔔 开启新财报推送通知</button>
        </div>
        
        <div class="sync-banner">
            <div>数据存于浏览器。换电脑请点击右侧：</div>
            <div><button class="btn-sm" onclick="exportData()">导出备份</button><button class="btn-sm" onclick="importData()">导入恢复</button></div>
        </div>
        
        <div id="holding" class="section active">
            <div class="market-filter-bar">
                <button class="filter-btn active" onclick="filterMarket(event, 'all')">全部卡片</button>
                <button class="filter-btn" onclick="filterMarket(event, 'A')">A股列表</button>
                <button class="filter-btn" onclick="filterMarket(event, 'HK')">港股列表</button>
                <button class="filter-btn" onclick="filterMarket(event, 'US')">美股列表</button>
            </div>
            <button class="btn-add" onclick="openModal()">+ 手动添加单只标的</button>
            <div id="list" class="cards-list"></div>
        </div>
        
        <div id="report" class="section">
            <div class="table-responsive">
                <table class="report-table">
                    <thead><tr><th>名称</th><th>市场</th><th>估值PE</th><th>净资产ROE</th><th>最新季报披露状态</th></tr></thead>
                    <tbody id="report-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:14px; color:var(--accent)">编辑持仓</h3>
            <input type="hidden" id="edit-idx">
            <div class="form-group"><label>代码 (A股纯数字/美股字母如NVDA)</label><input type="text" id="f-code" placeholder="如: AAPL"></div>
            <div class="form-group"><label>公司名称</label><input type="text" id="f-name" placeholder="如: 苹果公司"></div>
            <div class="form-group"><label>持仓数量</label><input type="number" id="f-qty"></div>
            <div class="form-group"><label>成本价</label><input type="number" step="0.01" id="f-cost"></div>
            <div class="form-group"><label>高价报警</label><input type="number" step="0.01" id="f-high"></div>
            <div class="form-group"><label>低价报警</label><input type="number" step="0.01" id="f-low"></div>
            <div class="modal-btns">
                <button class="btn-sm" style="background:#212e4a;" onclick="closeModal()">取消</button>
                <button class="btn-sm" style="background:var(--accent);color:#000;font-weight:bold;" onclick="save()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('my_stocks') || '[]');
        let currentMarketFilter = 'all';

        // 基础元数据配置：美股公司专属官网和 SEC 检索系统映射
        const usMetaConfig = {
            'AAPL': { web: 'https://www.apple.com/investor/', sec: 'https://www.sec.gov/edgar/browse/?CIK=0000320193' },
            'NVDA': { web: 'https://investor.nvidia.com/', sec: 'https://www.sec.gov/edgar/browse/?CIK=0001045810' },
            'MSFT': { web: 'https://www.microsoft.com/en-us/investor', sec: 'https://www.sec.gov/edgar/browse/?CIK=0000789019' },
            'META': { web: 'https://investor.fb.com/', sec: 'https://www.sec.gov/edgar/browse/?CIK=0001326801' },
            'TSLA': { web: 'https://ir.tesla.com/', sec: 'https://www.sec.gov/edgar/browse/?CIK=0001318605' },
            'AMZN': { web: 'https://www.amazon.com/ir', sec: 'https://www.sec.gov/edgar/browse/?CIK=0001018724' },
            'GOOGL':{ web: 'https://abc.xyz/investor/', sec: 'https://www.sec.gov/edgar/browse/?CIK=0001652044' }
        };

        function judgeMarket(code) {
            let c = code.toUpperCase().trim();
            if (/^\d+$/.test(c)) {
                if (c.length === 5 || (c.length === 4 && (c.startsWith('0') || c.startsWith('1')))) {
                    return { id: 'HK', name: '港股', badge: 'badge-hk' };
                }
                return { id: 'A', name: 'A股', badge: 'badge-a' };
            }
            return { id: 'US', name: '美股', badge: 'badge-us' };
        }

        // 开启系统级通知授权
        function requestNoticePermission() {
            if (!("Notification" in window)) {
                alert("当前手机或浏览器不支持系统弹窗通知。");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    alert("🔔 推送激活成功！当有公司发布新财务报告时，系统将在后台为您推送消息。");
                    // 派发一个首次测试通知
                    new Notification("全球财报通知中心", { body: "通知频道连接成功，实时行情监控已就绪。" });
                }
            });
        }

        function getMock(code) {
            let b = 100, pe = "16.4", roe = "14.2%", g = "+6.8%";
            let c = code.toUpperCase().trim();
            if(c.startsWith('600519')){ b=1750; pe="28.4"; roe="29.1%"; g="+18.2%"; }
            else if(usMetaConfig[c]) {
                if(c==='META') { b=485; pe="24.1"; roe="28.2%"; }
                if(c==='NVDA') { b=125; pe="65.2"; roe="45.1%"; }
                if(c==='AAPL') { b=182; pe="26.3"; roe="35.4%"; }
                if(c==='MSFT') { b=415; pe="35.1"; roe="38.2%"; }
            }
            let p = b * (1 + (Math.random()-0.49)/100);
            return { p: p.toFixed(2), c: ((Math.random()-0.49)*2).toFixed(2), pe, roe, g };
        }

        function render() {
            // 定义分类账本结构
            let mData = {
                all: { mv: 0, cv: 0, cnt: 0 },
                A:   { mv: 0, cv: 0, cnt: 0 },
                HK:  { mv: 0, cv: 0, cnt: 0 },
                US:  { mv: 0, cv: 0, cnt: 0 }
            };
            
            const list=document.getElementById('list'), rb=document.getElementById('report-body');
            list.innerHTML=''; rb.innerHTML='';
            
            stocks.forEach((s, i) => {
                let m = getMock(s.code);
                let market = judgeMarket(s.code);
                let curMv = s.qty * m.p;
                let costMv = s.qty * s.cost;
                
                // 账本数据分类统计归集
                mData.all.mv += curMv; mData.all.cv += costMv; mData.all.cnt++;
                mData[market.id].mv += curMv; mData[market.id].cv += costMv; mData[market.id].cnt++;

                let pft = curMv - costMv;
                let isAlert = (s.high && m.p >= s.high) || (s.low && m.p <= s.low);
                
                // 生成美股或者其他公司的底层链接资产
                let isUS = market.id === 'US';
                let config = usMetaConfig[s.code.toUpperCase().trim()] || { 
                    web: `https://www.google.com/search?q=${encodeURIComponent(s.name + ' 官网')}`, 
                    sec: `https://www.sec.gov/edgar/searchedgar/companysearch` 
                };

                if (currentMarketFilter === 'all' || currentMarketFilter === market.id) {
                    list.innerHTML += `<div class="stock-card ${isAlert?'alert':''}">
                        <div class="card-top">
                            <div>
                                <span class="code">${s.code}</span>
                                <a href="${config.web}" target="_blank" class="name-link">${s.name}</a>
                                <span class="market-badge ${market.badge}">${market.name}</span>
                            </div>
                            <div class="change ${m.c>=0?'up':'down'}">${m.c>=0?'▲':'▼'}${Math.abs(m.c)}%</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-cell"><div class="lbl">持仓量</div><div class="val">${s.qty}</div></div>
                            <div class="data-cell"><div class="lbl">现价</div><div class="val" style="color:var(--accent)">${m.p}</div></div>
                            <div class="data-cell"><div class="lbl">估算盈亏</div><div class="val ${pft>=0?'up':'down'}">${(pft/10000).toFixed(2)}万</div></div>
                            <div class="data-cell"><div class="lbl">总市值</div><div class="val">${(curMv/10000).toFixed(2)}万</div></div>
                        </div>
                        <div class="links-row">
                            <a href="${config.web}" target="_blank" class="ext-link">公司官网 🌐</a>
                            <a href="${config.sec}" target="_blank" class="ext-link sec">EDGAR (SEC) 🏛️</a>
                        </div>
                        <div class="card-ft">
                            <div>${isAlert?'⚠️ 触发价格设定线':'监控就绪'}</div>
                            <div><span onclick="edit(${i})" style="cursor:pointer;color:var(--accent)">编辑</span> <span onclick="del(${i})" style="color:#ff4d4f;margin-left:12px;cursor:pointer;">删除</span></div>
                        </div>
                    </div>`;
                }
                
                rb.innerHTML += `<tr>
                    <td style="font-weight:bold;">${s.name}</td>
                    <td><span class="market-badge ${market.badge}">${market.name}</span></td>
                    <td>${m.pe}</td>
                    <td style="color:var(--down)">${m.roe}</td>
                    <td><span style="color:var(--down);font-weight:bold;">● 已披露最新季报</span></td>
                </tr>`;
            });
            
            // 批量刷新全部分类大看板数据指标
            ['all', 'A', 'HK', 'US'].forEach(id => {
                document.getElementById(`cnt-${id}`).innerText = mData[id].cnt;
                document.getElementById(`mv-${id}`).innerText = '¥' + (mData[id].mv / 10000).toFixed(2) + '万';
                
                let tp = mData[id].mv - mData[id].cv;
                let ratio = mData[id].cv > 0 ? (tp / mData[id].cv * 100).toFixed(2) : '0.00';
                let targetNode = document.getElementById(`pft-${id}`);
                targetNode.innerText = `${tp >= 0 ? '+' : ''}${(tp / 10000).toFixed(2)}万 (${ratio}%)`;
                targetNode.className = 'cat-val ' + (tp >= 0 ? 'up' : 'down');
            });
        }

        // 模拟财报自动监测及系统级通知触发器
        function checkMockNewReport() {
            if (stocks.length === 0) return;
            // 随机抽取当前持仓的一只股票模拟发布财报
            let luckyStock = stocks[Math.floor(Math.random() * stocks.length)];
            let market = judgeMarket(luckyStock.code);
            
            let reportName = market.id === 'US' ? '最新 10-Q 季度财务报告' : '最新季度报告';
            
            if (Notification.permission === "granted") {
                new Notification(`📑 财报实时披露提醒`, {
                    body: `🚨 发现新公告：您持仓的 [${luckyStock.name} (${luckyStock.code})] 刚刚在 ${market.id === 'US' ? 'SEC EDGAR' : '交易所'} 发布了《${reportName}》，核心ROE表现优异，请及时前往系统查看核对！`,
                    icon: 'https://www.svgrepo.com/show/443194/financial-report.svg'
                });
            }
        }

        function filterMarket(e, marketId) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active'); currentMarketFilter = marketId; render();
        }
        function switchTab(e, id) {
            document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            e.target.classList.add('active'); document.getElementById(id).classList.add('active'); render();
        }
        function openModal() { document.getElementById('edit-idx').value=''; document.getElementById('modal').style.display='flex'; }
        function closeModal() { document.getElementById('modal').style.display='none'; }
        function edit(i) {
            const s=stocks[i]; document.getElementById('edit-idx').value=i;
            document.getElementById('f-code').value=s.code; document.getElementById('f-name').value=s.name;
            document.getElementById('f-qty').value=s.qty; document.getElementById('f-cost').value=s.cost;
            document.getElementById('f-high').value=s.high||''; document.getElementById('f-low').value=s.low||'';
            document.getElementById('modal').style.display='flex';
        }
        function save() {
            let i=document.getElementById('edit-idx').value, data={
                code: document.getElementById('f-code').value.trim(), name: document.getElementById('f-name').value.trim(),
                qty: parseInt(document.getElementById('f-qty').value) || 0, cost: parseFloat(document.getElementById('f-cost').value) || 0,
                high: parseFloat(document.getElementById('f-high').value) || null, low: parseFloat(document.getElementById('f-low').value) || null
            };
            if(data.code && data.name) {
                if(i==='') stocks.push(data); else stocks[i]=data;
                localStorage.setItem('my_stocks', JSON.stringify(stocks)); closeModal(); render();
            } else { alert('请完整填写代码和名称'); }
        }
        function del(i) { if(confirm('确定删除吗?')){ stocks.splice(i,1); localStorage.setItem('my_stocks', JSON.stringify(stocks)); render(); } }
        function exportData() { navigator.clipboard.writeText(JSON.stringify(stocks)); alert('数据已复制！'); }
        function importData() { let d=prompt('请粘贴JSON文本：'); if(d){ try { stocks=JSON.parse(d); localStorage.setItem('my_stocks', JSON.stringify(stocks)); render(); alert('导入成功！'); } catch(e) { alert('解析失败'); } } }
        
        // 定时刷新行情（4秒）
        setInterval(render, 4000); 
        // 模拟财报更新监测检测（每过30秒几率触发一次测试通知，你可以挂着网页测试看手机通知效果）
        setInterval(checkMockNewReport, 30000);
        render();
    </script>
</body>
</html>
