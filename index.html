<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO KINETIC - 财报深度透视专业版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --success: #2ea44f;
            --danger: #da3633;
            --warning: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 20px;
            line-height: 1.5;
        }
        .container { max-width: 1700px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 25px;
        }
        h1 { font-size: 22px; font-weight: 600; }
        
        .status-badge {
            background: #1f242c;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* 左右大排版两栏布局 */
        .financial-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }
        @media (max-width: 1000px) { .financial-layout { grid-template-columns: 1fr; } }

        /* 左侧公司选择目录 */
        .sidebar-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            height: fit-content;
        }
        .sidebar-title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .company-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .company-item {
            padding: 12px 15px;
            background: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .company-item:hover {
            border-color: #8b949e;
            background: #30363d;
        }
        .company-item.active {
            border-color: var(--primary);
            background: rgba(88, 166, 255, 0.1);
            box-shadow: inset 0 0 0 1px var(--primary);
        }
        .company-name { font-size: 14px; font-weight: 600; color: #fff; }
        .company-ticker { font-size: 11px; background: #30363d; padding: 2px 6px; border-radius: 4px; color: var(--text-muted); }

        /* 右侧核心财务指标大面板 */
        .main-panel { display: flex; flex-direction: column; gap: 20px; }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .panel-title { font-size: 24px; font-weight: bold; color: #fff; }
        
        /* 💡 核心指标 3x3 八宫格高密度布局 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
        }
        .metric-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .metric-value { font-size: 24px; font-weight: bold; color: #fff; display: flex; align-items: baseline; gap: 8px; }
        .metric-sub { font-size: 13px; font-weight: 600; }
        .trend-up { color: #39d353; }
        .trend-down { color: #f85149; }

        /* 趋势走势健康图表卡片 */
        .chart-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }
        .chart-title { font-size: 14px; color: var(--text-muted); margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .chart-container { height: 260px; position: relative; }

        .action-link {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            background: #21262d;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .action-link:hover { background: #30363d; color: #fff; border-color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>QUARTERLY FINANCIAL DIAGNOSTIC</h1>
            <p style="color: var(--text-muted); font-size: 13px;">上市公司季度财务深度透视面板 · 精简纯净版</p>
        </div>
        <div class="status-badge">● 核心财务数据库就绪</div>
    </header>

    <div class="financial-layout">
        <div class="sidebar-card">
            <div class="sidebar-title">🏢 标的公司财报选择目录</div>
            <ul class="company-list" id="companyList">
                </ul>
        </div>

        <div class="main-panel">
            <div class="panel-header">
                <div class="panel-title" id="activeCompanyName">--</div>
                <a href="#" id="secReportLink" target="_blank" class="action-link">📄 检索官方权威财报源</a>
            </div>

            <div class="metrics-grid">
                <div class="metric-box" style="border-left: 3px solid var(--primary);">
                    <div class="metric-label">最新单季度总主营收入 (Revenue)</div>
                    <div class="metric-value" id="m-revenue">--</div>
                </div>
                <div class="metric-box" style="border-left: 3px solid #ff9f43;">
                    <div class="metric-label">季度归母净利润 (Net Income)</div>
                    <div class="metric-value" id="m-netincome">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">单季度整体销售毛利率</div>
                    <div class="metric-value" id="m-grossmargin" style="color: #ff9f43;">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">单季度整体销售净利率</div>
                    <div class="metric-value" id="m-netmargin" style="color: #4cd137;">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">单季度摊薄后每股收益 (EPS)</div>
                    <div class="metric-value" id="m-eps" style="color: #f1c40f;">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">每股净资产 (BPS)</div>
                    <div class="metric-value" id="m-bps">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">动态 / 滚动市盈率 (PE Ratio)</div>
                    <div class="metric-value" id="m-pe">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">市净率 (PB Ratio)</div>
                    <div class="metric-value" id="m-pb">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">市销率 (PS Ratio)</div>
                    <div class="metric-value" id="m-ps">--</div>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">📊 连续四个季度销售主营回款及规模扩张走势健康度</div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 全功能核心证券基本面底层大数据库
const MASTER_FINANCIAL_DB = {
    'AAPL': {
        name: 'Apple Inc. (苹果公司)',
        market: '美股',
        revenue: '94.90B', revTrend: '+ 6.1%', revUp: true,
        netIncome: '21.40B', netTrend: '+ 4.9%', netUp: true,
        grossMargin: '46.2%',
        netMargin: '22.5%',
        eps: '$1.64',
        bps: '$4.12',
        pe: '31.4',
        pb: '54.2',
        ps: '7.8',
        chartLabels: ['Q1', 'Q2', 'Q3', 'Q4'],
        chartData: [90.8, 92.5, 85.8, 94.9]
    },
    'AES': {
        name: 'AES Corp. (应用能源)',
        market: '美股',
        revenue: '3.42B', revTrend: '+ 2.3%', revUp: true,
        netIncome: '0.24B', netTrend: '- 1.5%', revUp: false,
        grossMargin: '22.4%',
        netMargin: '7.1%',
        eps: '$0.34',
        bps: '$4.56',
        pe: '11.8',
        pb: '3.1',
        ps: '0.8',
        chartLabels: ['Q1', 'Q2', 'Q3', 'Q4'],
        chartData: [3.1, 3.2, 3.5, 3.42]
    },
    'AEP': {
        name: 'American Electric Power (美国电力)',
        market: '美股',
        revenue: '5.10B', revTrend: '+ 4.1%', revUp: true,
        netIncome: '0.63B', netTrend: '+ 5.2%', revUp: true,
        grossMargin: '38.7%',
        netMargin: '12.3%',
        eps: '$1.21',
        bps: '$48.30',
        pe: '16.2',
        pb: '1.9',
        ps: '2.0',
        chartLabels: ['Q1', 'Q2', 'Q3', 'Q4'],
        chartData: [4.8, 4.9, 5.2, 5.10]
    },
    'SOFI': {
        name: 'SoFi Technologies',
        market: '美股',
        revenue: '0.68B', revTrend: '+ 30.2%', revUp: true,
        netIncome: '0.09B', netTrend: '+ 110%', revUp: true,
        grossMargin: '76.3%',
        netMargin: '14.3%',
        eps: '$0.05',
        bps: '$5.40',
        pe: '65.0',
        pb: '2.6',
        ps: '4.8',
        chartLabels: ['Q1', 'Q2', 'Q3', 'Q4'],
        chartData: [0.52, 0.58, 0.62, 0.68]
    },
    'C': {
        name: 'Citigroup Inc. (花旗集团)',
        market: '美股',
        revenue: '20.32B', revTrend: '+ 1.1%', revUp: true,
        netIncome: '3.23B', netTrend: '- 4.3%', revUp: false,
        grossMargin: '44.1%',
        netMargin: '15.9%',
        eps: '$1.51',
        bps: '$98.50',
        pe: '9.2',
        pb: '0.55',
        ps: '1.4',
        chartLabels: ['Q1', 'Q2', 'Q3', 'Q4'],
        chartData: [21.1, 20.2, 19.8, 20.32]
    },
    'GE': {
        name: 'General Electric (通用电气)',
        market: '美股',
        revenue: '8.94B', revTrend: '+ 5.8%', revUp: true,
        netIncome: '0.78B', netTrend: '+ 8.4%', revUp: true,
        grossMargin: '29.5%',
        netMargin: '8.7%',
        eps: '$1.15',
        bps: '$28.10',
        pe: '35.2',
        pb: '5.4',
        ps: '2.1',
        chartLabels: ['Q1', 'Q2', 'Q3', 'Q4'],
        chartData: [8.2, 8.5, 8.8, 8.94]
    },
    'NVDA': {
        name: 'NVIDIA Corp. (英伟达)',
        market: '美股',
        revenue: '35.10B', revTrend: '+ 94.2%', revUp: true,
        netIncome: '19.30B', netTrend: '+ 106%', revUp: true,
        grossMargin: '75.1%',
        netMargin: '55.0%',
        eps: '$0.78',
        bps: '$3.20',
        pe: '68.4',
        pb: '42.1',
        ps: '26.4',
        chartLabels: ['Q1', 'Q2', 'Q3', 'Q4'],
        chartData: [22.1, 26.0, 30.0, 35.1]
    }
};

let currentChartInstance = null;

function initSidebar() {
    const listEl = document.getElementById('companyList');
    listEl.innerHTML = '';
    
    Object.keys(MASTER_FINANCIAL_DB).forEach((ticker, index) => {
        const data = MASTER_FINANCIAL_DB[ticker];
        const li = document.createElement('li');
        li.className = `company-item ${index === 0 ? 'active' : ''}`;
        li.setAttribute('data-ticker', ticker);
        li.onclick = () => switchCompany(ticker);
        li.innerHTML = `
            <span class="company-name">${data.name.split(' (')[0]}</span>
            <span class="company-ticker">${ticker}</span>
        `;
        listEl.appendChild(li);
    });
    
    // 默认展示首家公司
    switchCompany(Object.keys(MASTER_FINANCIAL_DB)[0]);
}

function switchCompany(ticker) {
    // 切换高亮状态
    document.querySelectorAll('.company-item').forEach(item => {
        item.classList.remove('active');
        if(item.getAttribute('data-ticker') === ticker) item.classList.add('active');
    });

    const data = MASTER_FINANCIAL_DB[ticker];
    if(!data) return;

    // 填充顶部及标签
    document.getElementById('activeCompanyName').innerText = data.name;
    
    // 🟢 智能校正 SEC 财报及各类检索跳转 URL 逻辑
    const reportLinkEl = document.getElementById('secReportLink');
    if (data.market === "美股") {
        reportLinkEl.href = `https://www.sec.gov/edgar/browse/?CIK=${ticker}`;
        reportLinkEl.innerText = "📄 检索 SEC 官方财务报表";
    } else {
        reportLinkEl.href = `http://www.cninfo.com.cn/new/fulltextSearch?notautosubmit=&searchkey=${ticker}`;
        reportLinkEl.innerText = "📄 检索巨潮权威公告";
    }

    // 填充核心网格指标数据
    document.getElementById('m-revenue').innerHTML = `${data.revenue} <span class="metric-sub ${data.revUp ? 'trend-up' : 'trend-down'}">${data.revTrend}</span>`;
    document.getElementById('m-netincome').innerHTML = `${data.netIncome} <span class="metric-sub ${data.netUp ? 'trend-up' : 'trend-down'}">${data.netTrend}</span>`;
    document.getElementById('m-grossmargin').innerText = data.grossMargin;
    document.getElementById('m-netmargin').innerText = data.netMargin;
    document.getElementById('m-eps').innerText = data.eps;
    document.getElementById('m-bps').innerText = data.bps;
    document.getElementById('m-pe').innerText = data.pe;
    document.getElementById('m-pb').innerText = data.pb;
    document.getElementById('m-ps').innerText = data.ps;

    // 渲染走势折线图
    renderTrendChart(data.chartLabels, data.chartData, ticker);
}

function renderTrendChart(labels, dataValues, ticker) {
    const ctx = document.getElementById('trendChart').getContext('2d');
    
    if (currentChartInstance) {
        currentChartInstance.destroy();
    }

    currentChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: `${ticker} 单季度营收规模波动 ($B)`,
                data: dataValues,
                borderColor: '#58a6ff',
                backgroundColor: 'rgba(88, 166, 255, 0.1)',
                borderWidth: 2,
                tension: 0.2,
                fill: true,
                pointBackgroundColor: '#58a6ff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true, labels: { color: '#8b949e' } }
            },
            scales: {
                x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
                y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } }
            }
        }
    });
}

// 启动
window.addEventListener('DOMContentLoaded', initSidebar);
</script>
</body>
</html>
