<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球多账户多行业资产综合管理系统 - PORTFOLIO</title>
    <style>
        :root { 
            --bg-color: #0b111e; 
            --card-bg: #161e2e; 
            --text-color: #f5f6fa; 
            --accent: #00f2fe; 
            --up: #ff4d4f; 
            --down: #2ecc71; 
            --border: #242f47; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); padding: 16px; padding-bottom: 80px; }
        
        .container { max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .header { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
        .title-main { font-size: 26px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }
        
        /* 核心升级：多层级账户大面板（统一汇总 + 分账户汇总） */
        .summary-section-title { font-size: 13px; color: #6c7a9c; margin-bottom: 6px; font-weight: bold; display: flex; align-items: center; gap: 5px;}
        .stats-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stats-category-card { background: var(--card-bg); border-radius: 12px; padding: 14px; border: 1px solid var(--border); position: relative; }
        .cat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c273d; padding-bottom: 6px; margin-bottom: 10px; }
        .cat-title { font-weight: bold; font-size: 14px; }
        .cat-count { font-size: 11px; background: #212e4a; padding: 2px 8px; border-radius: 10px; color: var(--accent); }
        .cat-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
        .cat-lbl { color: #536380; }
        .cat-val { font-weight: bold; font-size: 14px; }

        /* 标签与过滤器 */
        .tabs-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .tabs { display: flex; gap: 5px; }
        .tab-item { padding: 12px 16px; cursor: pointer; color: #6c7a9c; font-size: 14px; border-bottom: 2px solid transparent; }
        .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }
        
        .notice-setting-btn { background: rgba(0, 242, 254, 0.05); color: var(--accent); border: 1px solid rgba(0,242,254,0.3); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }

        .filter-container { background: rgba(255,255,255,0.01); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; font-size: 12px; }
        .filter-row:last-child { margin-bottom: 0; }
        .filter-lbl { color: #6c7a9c; min-width: 60px; font-weight: bold; }
        .filter-options { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn { background: #1c273d; color: #a5b7da; border: 1px solid var(--border); padding: 4px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; }
        .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        .sync-banner { background: rgba(0, 242, 254, 0.02); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 12px; }
        .btn-sm { background: #212e4a; color: #a5b7da; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn-add { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; font-size: 15px; }
        
        /* 列表网格 */
        .cards-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
        .stock-card { background: var(--card-bg); border-radius: 12px; padding: 16px; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: space-between; }
        .stock-card.alert { border-color: var(--up); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 0px rgba(255,77,79,0); } 50% { box-shadow: 0 0 10px rgba(255,77,79,0.15); } }
        
        .card-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .badge-group { display: flex; gap: 4px; align-items: center; margin-left: 5px; }
        .market-badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: bold; }
        .badge-a { background: rgba(255,77,79,0.12); color: var(--up); }
        .badge-hk { background: rgba(0,242,254,0.12); color: var(--accent); }
        .badge-us { background: rgba(46,204,113,0.12); color: var(--down); }
        .badge-acct { background: rgba(155,89,182,0.15); color: #9b59b6; }
        .badge-sector { background: rgba(241,196,15,0.12); color: #f1c40f; }

        .code { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 14px; }
        .name-link { font-weight: bold; font-size: 15px; color: #fff; text-decoration: none; line-height: 1.2; }
        .name-link:hover { color: var(--accent); text-decoration: underline; }
        .change { font-weight: bold; font-size: 14px; }
        
        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: rgba(0,0,0,0.15); padding: 10px; border-radius: 8px; }
        .data-cell { text-align: center; }
        .lbl { font-size: 10px; color: #536380; margin-bottom: 2px; }
        .val { font-size: 13px; font-weight: 500; }
        
        .links-row { display: flex; gap: 6px; margin-top: 10px; }
        .ext-link { flex: 1; text-align: center; background: #1c273d; color: #8fa0c4; font-size: 11px; padding: 5px; border-radius: 4px; text-decoration: none; border: 1px solid #24324f; }
        .ext-link:hover { background: #24324f; color: #fff; }
        .ext-link.sec { border-color: #e67e22; color: #e67e22; background: rgba(230,126,34,0.03); }
        .ext-link.sec:hover { background: #e67e22; color: #fff; }

        .card-ft { margin-top: 10px; padding-top: 8px; border-top: 1px solid #1c273d; display: flex; justify-content: space-between; font-size: 11px; color: #6c7a9c; }
        .up { color: var(--up); } .down { color: var(--down); }
        
        /* 报表响应式 */
        .table-responsive { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 12px; padding: 6px; margin-bottom: 15px; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        .report-table th { text-align: left; color: #6c7a9c; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
        .report-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
        
        /* 行业统计专属横幅 */
        .sector-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .sector-box { background: rgba(255,255,255,0.01); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .sector-box-title { font-size: 11px; color: #6c7a9c; margin-bottom: 2px; }
        .sector-box-val { font-size: 13px; font-weight: bold; color: #fff; }

        /* 弹窗及表单 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); border-radius: 15px; padding: 20px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #8fa0c4; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; background: #0b111e; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; font-size: 13px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><div class="title-main">PORTFOLIO</div><div style="font-size:11px;color:#8da2fb;margin-top:2px;">全球多账户多行业资产交叉监控看板</div></div>
        </div>
        
        <div class="summary-section-title">🗃️ 资产财务账本汇总矩阵 (三层统一架构)</div>
        <div class="stats-board">
            <div class="stats-category-card" style="border-color: var(--accent); background: linear-gradient(145deg, #161e2e, #111a28);">
                <div class="cat-header"><span class="cat-title" style="color:var(--accent); font-size:15px;">👑 全账户大统一汇总</span><span class="cat-count" id="cnt-all">0</span></div>
                <div class="cat-row"><span class="cat-lbl">总资产市值 (CNY)</span><span class="cat-val" style="font-size:16px; color:var(--accent);" id="mv-all">¥0.00</span></div>
                <div class="cat-row"><span class="cat-lbl">预计总盈亏/收益率</span><span class="cat-val" id="pft-all">¥0.00 (0%)</span></div>
            </div>
            <div class="stats-category-card">
                <div class="cat-header"><span class="cat-title" style="color:#9b59b6;">🔒 L 独立账户</span><span class="cat-count" id="cnt-acct-L">0</span></div>
                <div class="cat-row"><span class="cat-lbl">账户内市值</span><span class="cat-val" id="mv-acct-L">¥0.00</span></div>
                <div class="cat-row"><span class="cat-lbl">账户内盈亏/收益率</span><span class="cat-val" id="pft-acct-L">¥0.00 (0%)</span></div>
            </div>
            <div class="stats-category-card">
                <div class="cat-header"><span class="cat-title" style="color:#e74c3c;">🔑 X 独立账户</span><span class="cat-count" id="cnt-acct-X">0</span></div>
                <div class="cat-row"><span class="cat-lbl">账户内市值</span><span class="cat-val" id="mv-acct-X">¥0.00</span></div>
                <div class="cat-row"><span class="cat-lbl">账户内盈亏/收益率</span><span class="cat-val" id="pft-acct-X">¥0.00 (0%)</span></div>
            </div>
        </div>
        
        <div class="tabs-bar">
            <div class="tabs">
                <div class="tab-item active" onclick="switchTab(event, 'holding')">📊 持仓头寸</div>
                <div class="tab-item" onclick="switchTab(event, 'report')">📑 行业与配置分布</div>
            </div>
            <button class="notice-setting-btn" onclick="requestNoticePermission()">🔔 激活新财报系统通知</button>
        </div>
        
        <div class="sync-banner">
            <div>本地沙盒数据同步：</div>
            <div><button class="btn-sm" onclick="exportData()">导出备份</button><button class="btn-sm" onclick="importData()">导入恢复</button></div>
        </div>
        
        <div id="holding" class="section active">
            <div class="filter-container">
                <div class="filter-row">
                    <div class="filter-lbl">筛选账户：</div>
                    <div class="filter-options">
                        <button class="filter-btn active" data-type="acct" onclick="setFilter(this, 'all')">全部账户</button>
                        <button class="filter-btn" data-type="acct" onclick="setFilter(this, 'L')">L 账户</button>
                        <button class="filter-btn" data-type="acct" onclick="setFilter(this, 'X')">X 账户</button>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-lbl">行业板块：</div>
                    <div class="filter-options">
                        <button class="filter-btn active" data-type="sector" onclick="setFilter(this, 'all')">全板块</button>
                        <button class="filter-btn" data-type="sector" onclick="setFilter(this, '公共事业')">⚡ 公共事业</button>
                        <button class="filter-btn" data-type="sector" onclick="setFilter(this, '科技')">💻 科技</button>
                        <button class="filter-btn" data-type="sector" onclick="setFilter(this, '消费')">🛍️ 消费</button>
                        <button class="filter-btn" data-type="sector" onclick="setFilter(this, '金融')">🏦 金融</button>
                    </div>
                </div>
            </div>

            <button class="btn-add" onclick="openModal()">+ 添加全新证券/基金持仓</button>
            <div id="list" class="cards-list"></div>
        </div>
        
        <div id="report" class="section">
            <div class="summary-section-title">🧱 四大核心行业板块资金集中度汇总</div>
            <div class="sector-summary-grid">
                <div class="sector-box"><div class="sector-box-title">⚡ 公共事业</div><div class="sector-box-val" id="sec-val-公共事业">¥0.00 (0%)</div></div>
                <div class="sector-box"><div class="sector-box-title">💻 科技板块</div><div class="sector
